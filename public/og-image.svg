<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e8efff"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#cbd6e6" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Centered logo + wordmark group -->
  <g transform="translate(310 245)" stroke="#0f172a" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="9">
    <line x1="20" y1="20" x2="160" y2="20"/>
    <line x1="90" y1="20" x2="90" y2="170"/>
    <!-- Broken mid arms — gap on each side of the central vertical. -->
    <line x1="28" y1="85" x2="72" y2="85"/>
    <line x1="108" y1="85" x2="152" y2="85"/>
    <circle cx="20" cy="85" r="12"/>
    <circle cx="160" cy="85" r="12"/>
    <circle cx="90" cy="180" r="12"/>
  </g>
  <text x="520" y="335" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="120" font-weight="700" fill="#0f172a" letter-spacing="-2">Spice Sim</text>

  <text x="520" y="395" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="500" fill="#475569">
    Browser SPICE circuit simulator
  </text>

  <text x="520" y="448" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#64748b">
    Schematic editor · ngspice via WebAssembly · live waveforms
  </text>
</svg>
