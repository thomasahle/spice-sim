<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="#111111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Top horizontal bar -->
  <line x1="5" y1="5" x2="27" y2="5"/>
  <!-- Central vertical: top bar → bottom terminal -->
  <line x1="16" y1="5" x2="16" y2="28"/>
  <!-- Left and right arms — broken at the centre so the horizontal wire
       reads as passing BEHIND the T rather than connecting to it. -->
  <line x1="6" y1="15" x2="13" y2="15"/>
  <line x1="19" y1="15" x2="26" y2="15"/>
  <!-- Three hollow terminals (rings, not dots). -->
  <circle cx="4" cy="15" r="2"/>
  <circle cx="28" cy="15" r="2"/>
  <circle cx="16" cy="29" r="2"/>
</svg>
